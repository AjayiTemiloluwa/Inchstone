<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inchstone – Reconnecting…</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 2rem;
      text-align: center;
    }
    .icon {
      font-size: 3.5rem;
      margin-bottom: 1.5rem;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.95); }
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 0.95rem;
      color: #888;
      max-width: 320px;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    button {
      background: #fff;
      color: #000;
      border: none;
      border-radius: 0.75rem;
      padding: 0.75rem 2rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.8; }
    button:active { opacity: 0.6; transform: scale(0.97); }
    .status {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="icon">🌿</div>
  <h1>You're offline</h1>
  <p>Inchstone can't reach the server right now. Check your connection and try again.</p>
  <button onclick="tryReconnect()">Try again</button>
  <div class="status" id="status"></div>

  <script>
    function tryReconnect() {
      document.getElementById('status').textContent = 'Checking connection…';
      fetch('/', { method: 'HEAD', cache: 'no-store' })
        .then(() => { window.location.href = '/'; })
        .catch(() => {
          document.getElementById('status').textContent = 'Still offline. Please wait…';
          setTimeout(() => { document.getElementById('status').textContent = ''; }, 3000);
        });
    }

    // Auto-retry every 5 seconds
    setInterval(() => {
      fetch('/', { method: 'HEAD', cache: 'no-store' })
        .then(() => { window.location.href = '/'; })
        .catch(() => {});
    }, 5000);
  </script>
</body>
</html>
